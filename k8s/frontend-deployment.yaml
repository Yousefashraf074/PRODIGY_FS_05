# Kubernetes Deployment for ConnectSphere Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectsphere-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: connectsphere-frontend
  template:
    metadata:
      labels:
        app: connectsphere-frontend
    spec:
      containers:
        - name: frontend
          image: connectsphere-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-config
            - secretRef:
                name: frontend-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
