# Kubernetes Ingress for ConnectSphere
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: connectsphere-ingress
spec:
  rules:
    - host: connectsphere.local
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: connectsphere-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: connectsphere-frontend
                port:
                  number: 3000
