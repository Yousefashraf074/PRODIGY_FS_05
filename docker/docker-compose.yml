# Docker Compose for ConnectSphere
# Services: frontend, backend, postgres, redis, nginx
version: '3.8'
services:
  frontend:
    build: ../frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: always

  backend:
    build: ../backend
    ports:
      - '5000:5000'
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/connectsphere
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - postgres
      - redis
    restart: always

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: connectsphere
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - '3006:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  pgdata:
